- name: Configure server
  hosts: web
  become: yes

  tasks:
    - name: Install Apache
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Start Apache
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create index page
      copy:
        dest: /var/www/html/index.html
        content: "<h1>Hello from Ansible Project 🚀</h1>"

